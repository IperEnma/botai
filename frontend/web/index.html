<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="description" content="A new Flutter project.">

  <!-- google-signin-client_id: en runtime main() la inyecta desde GOOGLE_CLIENT_ID_WEB (.env). -->

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="botai_admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>BotAI Admin</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (function () {
      var BUILD_KEY = 'botai_build_id';

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        });
      }

      function loadFlutter() {
        var s = document.createElement('script');
        s.src = 'flutter_bootstrap.js';
        s.async = true;
        document.body.appendChild(s);
      }

      // Tras cada deploy Vercel escribe buildId en /version.json (ver vercel-build.sh).
      // Si cambió, recargamos una vez: el usuario no tiene que borrar caché manualmente.
      fetch('/version.json?t=' + Date.now(), { cache: 'no-store' })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (v) {
          var next = (v && v.buildId) ? String(v.buildId) : '';
          var prev = localStorage.getItem(BUILD_KEY);
          if (prev && next && prev !== next) {
            localStorage.setItem(BUILD_KEY, next);
            location.replace(location.href);
            return;
          }
          if (next) localStorage.setItem(BUILD_KEY, next);
          loadFlutter();
        })
        .catch(function () { loadFlutter(); });
    })();
  </script>
</body>
</html>
