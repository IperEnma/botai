# Overrides para tests de integración (PostgreSQL vía Testcontainers).

spring:
  task:
    scheduling:
      enabled: false
  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration/agenda
    table: agenda_flyway_schema_history
    repair-on-migrate: true

  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAutoConfiguration

  ai:
    model:
      chat: none
      embedding: none

urls:
  backend: http://localhost:8080
  frontend: http://localhost:5173

security:
  enabled: false

schedulers:
  enabled: false

bot:
  embedding:
    provider: none
  rag:
    max-chunks: 1
    min-similarity: 0.7
  memory:
    max-history-turns: 1
  session:
    idle-minutes: 45
  buffer:
    debounce-ms: 2500
  guardrails:
    enabled: false
  channels:
    web:
      base-path: /api/v1/webhook

logging:
  level:
    root: WARN
    com.botai: INFO
    org.flywaydb: INFO
