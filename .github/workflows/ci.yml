name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop, "release/**", "hotfix/**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # No cancelar en vuelo: OWASP escribe una BD H2 de CVEs; cancelar a medias la corrompe.
  cancel-in-progress: false

# Modo configuración: GitHub → Settings → Variables → CI_RELAXED=true
# Los jobs fallidos no bloquean el workflow (amarillo). Quitar cuando CI esté estable.

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep
    needs: [gitleaks]
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: |
          semgrep scan --error \
            --config p/java \
            --config p/owasp-top-ten \
            backend/
      # p/dart ya no existe en el registry (404). Secrets + flutter analyze cubren frontend.
      - run: |
          semgrep scan --error \
            --config p/secrets \
            frontend/lib/

  dependency-check:
    name: OWASP Dependency-Check
    needs: [gitleaks]
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Cache OWASP NVD database
        id: owasp-nvd-cache
        uses: actions/cache@v4
        with:
          # Ruta fija (no la default con subcarpeta /12.0 que invalida restores).
          path: ~/.owasp-nvd-cache
          key: owasp-nvd-${{ runner.os }}-v4
          restore-keys: |
            owasp-nvd-${{ runner.os }}-
      - name: Run OWASP Dependency-Check
        working-directory: backend
        run: |
          DATA_DIR="${HOME}/.owasp-nvd-cache"
          mkdir -p "$DATA_DIR"
          OWASP_OPTS=(
            -DfailBuildOnCVSS=7
            -DsuppressionFiles=dependency-check-suppressions.xml
            -DnvdMaxRetryCount=10
            -DdataDirectory="${DATA_DIR}"
          )
          if [ -n "${{ secrets.NVD_API_KEY }}" ]; then
            OWASP_OPTS+=(-DnvdApiKey="${{ secrets.NVD_API_KEY }}")
          fi
          CACHE_HIT="${{ steps.owasp-nvd-cache.outputs.cache-hit }}"
          HAS_NVD=false
          if [ -d "$DATA_DIR" ] && [ -n "$(find "$DATA_DIR" -name '*.h2.db' -o -name 'nvdcve-2.0-*.json' 2>/dev/null | head -1)" ]; then
            HAS_NVD=true
          fi
          if [ "$CACHE_HIT" = "true" ] && [ "$HAS_NVD" = "true" ]; then
            echo "NVD cache hit — reutilizando BD local (sin descargar CVEs)"
            OWASP_OPTS+=(-DautoUpdate=false -DnvdValidForHours=8760)
          else
            echo "NVD cache miss o vacía — descarga inicial (~15–30 min). Luego será rápido."
            OWASP_OPTS+=(-DnvdApiDelay=4000 -DnvdValidForHours=168)
          fi
          mvn -B org.owasp:dependency-check-maven:12.2.2:check "${OWASP_OPTS[@]}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: backend/target/dependency-check-report.html
          retention-days: 14

  backend:
    name: Backend tests
    needs: [gitleaks, semgrep, dependency-check]
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: mvn test
        working-directory: backend
        run: mvn test -B

  frontend:
    name: Frontend analyze & test
    needs: [gitleaks, semgrep]
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: frontend
      - run: flutter analyze
        working-directory: frontend
      - run: flutter test
        working-directory: frontend

  sonarcloud:
    name: SonarCloud
    needs: [backend, frontend]
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Compile backend for Sonar
        working-directory: backend
        run: mvn -B -DskipTests compile test-compile
      - uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  ci:
    name: ci
    needs: [gitleaks, semgrep, dependency-check, backend, frontend, sonarcloud]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: CI gate
        run: |
          if [ "${{ vars.CI_RELAXED }}" = "true" ]; then
            echo "::warning::CI_RELAXED=true — pipeline no bloquea por fallos en jobs previos."
            exit 0
          fi
          ok() { case "$1" in success|skipped) return 0 ;; *) return 1 ;; esac; }
          ok "${{ needs.gitleaks.result }}" && ok "${{ needs.semgrep.result }}" && \
          ok "${{ needs.dependency-check.result }}" && ok "${{ needs.backend.result }}" && \
          ok "${{ needs.frontend.result }}" && ok "${{ needs.sonarcloud.result }}" || {
            echo "CI failed — desactivá fallos o arreglá jobs; sin CI_RELAXED no pasa."
            exit 1
          }
          echo "All checks passed"

  build-artifacts:
    name: Build artifacts (test)
    needs: [ci]
    if: >-
      needs.ci.result == 'success' &&
      github.event_name == 'push' &&
      endsWith(github.ref_name, '.x.x-beta')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Build backend JAR + frontend web
        env:
          # Environment staging o repo: STAGING_* o nombres cortos (como en Vercel).
          KONECTA_BASE_URL: ${{ vars.STAGING_KONECTA_BASE_URL || vars.STAGING_API_BASE_URL || vars.KONECTA_BASE_URL }}
          GOOGLE_CLIENT_ID_WEB: ${{ secrets.STAGING_GOOGLE_CLIENT_ID_WEB || secrets.GOOGLE_CLIENT_ID_WEB }}
        run: |
          missing=()
          [[ -z "${KONECTA_BASE_URL:-}" ]] && missing+=("STAGING_KONECTA_BASE_URL (variable)")
          [[ -z "${GOOGLE_CLIENT_ID_WEB:-}" ]] && missing+=("STAGING_GOOGLE_CLIENT_ID_WEB (secret)")
          if ((${#missing[@]})); then
            echo "::error::Build artifacts requiere en GitHub → Environments → staging (o Variables/Secrets del repo): ${missing[*]}"
            echo "KONECTA_BASE_URL ej: https://botai-backend-test.onrender.com (sin /api)"
            exit 1
          fi
          bash scripts/ci-build-test-artifacts.sh
      - name: Upload test deploy artifacts
        uses: actions/upload-artifact@v4
        with:
          name: botai-build-${{ github.sha }}
          path: dist/botai-build/
          retention-days: 90
          if-no-files-found: error

  beta-tag:
    name: Versionado (beta)
    needs: [ci, build-artifacts]
    if: >-
      needs.ci.result == 'success' &&
      needs.build-artifacts.result == 'success' &&
      github.event_name == 'push' &&
      endsWith(github.ref_name, '.x.x-beta')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create beta tag from branch template
        id: tag
        env:
          RELEASE_VERSION_REMOTE: origin
        run: |
          git fetch origin --tags
          OUT=$(bash scripts/release-version.sh tag-beta-from-branch --push origin)
          echo "$OUT"
          TAG=$(echo "$OUT" | grep '^tag=' | tail -1 | cut -d= -f2)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  beta-tag-visible:
    name: ${{ format('Deploy test → {0}', needs.beta-tag.outputs.tag) }}
    needs: [beta-tag]
    if: needs.beta-tag.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Tag visible en el grafo y en Annotations
        run: |
          TAG="${{ needs.beta-tag.outputs.tag }}"
          echo "::notice title=Deploy test::Tag ${TAG} — Actions → Deploy test → Run workflow"
          {
            echo "## Deploy test"
            echo ""
            echo "# \`${TAG}\`"
            echo ""
            echo "**Actions → Deploy test → Run workflow** y pegá ese tag."
          } >> "$GITHUB_STEP_SUMMARY"

  final-tag:
    name: Versionado (final)
    needs: [ci]
    if: >-
      needs.ci.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create final tag from latest beta
        id: tag
        env:
          RELEASE_VERSION_REMOTE: origin
        run: |
          git fetch origin --tags
          OUT=$(bash scripts/release-version.sh tag-final-from-main --push origin)
          echo "$OUT"
          TAG=$(echo "$OUT" | grep '^tag=' | tail -1 | cut -d= -f2)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  final-tag-visible:
    name: ${{ format('Deploy prod → {0}', needs.final-tag.outputs.tag) }}
    needs: [final-tag]
    if: needs.final-tag.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Tag visible en el grafo y en Annotations
        run: |
          TAG="${{ needs.final-tag.outputs.tag }}"
          echo "::notice title=Deploy production::Tag ${TAG} — Actions → Deploy production → Run workflow"
          {
            echo "## Deploy production"
            echo ""
            echo "# \`${TAG}\`"
            echo ""
            echo "**Actions → Deploy production → Run workflow** y pegá ese tag."
          } >> "$GITHUB_STEP_SUMMARY"
