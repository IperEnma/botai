<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=1280, height=720, initial-scale=1.0" name="viewport"/>
<title>¿Qué es el problema de las N-Reinas?</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
body{margin:0;padding:0;width:1280px;height:720px;overflow:hidden;font-family:'Source Sans Pro',sans-serif;background:#F7F8FA;color:#1F3A5F;display:flex;flex-direction:column;}
.header{padding:40px 60px 20px;display:flex;flex-direction:column;align-items:flex-start;}
.header h1{font-size:42px;font-weight:700;color:#1F3A5F;margin:0;line-height:1.2;}
.accent-bar{width:100px;height:6px;background:#2A9D8F;margin-top:15px;border-radius:3px;}
.content-wrapper{display:flex;flex:1;padding:20px 60px 60px;align-items:center;justify-content:space-between;}
.text-column{flex:0 0 55%;padding-right:40px;}
.visual-column{flex:0 0 40%;display:flex;justify-content:center;align-items:center;height:100%;}
.bullet-item{display:flex;align-items:flex-start;margin-bottom:35px;background:#fff;padding:25px;border-radius:12px;box-shadow:0 4px 6px rgba(31,58,95,.05);border-left:5px solid #2A9D8F;}
.bullet-icon{color:#2A9D8F;font-size:24px;margin-right:20px;margin-top:4px;flex-shrink:0;width:30px;text-align:center;}
.bullet-text{font-size:24px;font-weight:400;color:#4A5568;line-height:1.4;margin:0;}
.bullet-text strong{color:#1F3A5F;font-weight:600;}
.board-container{width:400px;height:400px;background:#fff;border-radius:16px;box-shadow:0 10px 25px rgba(31,58,95,.15);padding:20px;display:flex;justify-content:center;align-items:center;}
.chess-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);width:100%;height:100%;border:2px solid #1F3A5F;}
.cell{display:flex;justify-content:center;align-items:center;font-size:32px;}
.cell-white{background:#F7F8FA;}
.cell-black{background:#1F3A5F;}
.queen-piece{color:#2A9D8F;font-size:48px;}
.decoration-circle{position:absolute;width:200px;height:200px;border-radius:50%;background:#2A9D8F;opacity:.05;top:-20px;right:-20px;}
.page-number{position:absolute;bottom:20px;right:30px;font-size:14px;color:#A0AEC0;}
</style>
</head>
<body>
<div class="header"><h1>¿Qué es el problema de las N-Reinas?</h1><div class="accent-bar"></div></div>
<div class="content-wrapper">
<div class="text-column">
<div class="bullet-item"><div class="bullet-icon"><i class="fa-solid fa-calculator"></i></div><p class="bullet-text"><strong>Problema clásico</strong> de matemáticas y ciencias de la computación.</p></div>
<div class="bullet-item"><div class="bullet-icon"><i class="fa-solid fa-chess-board"></i></div><p class="bullet-text">Consiste en colocar <strong>N reinas</strong> en un tablero <strong>N×N</strong>.</p></div>
<div class="bullet-item"><div class="bullet-icon"><i class="fa-solid fa-ban"></i></div><p class="bullet-text"><strong>Ninguna reina</strong> debe poder atacar a otra.</p></div>
</div>
<div class="visual-column">
<div class="board-container"><div class="decoration-circle"></div>
<div class="chess-grid">
<div class="cell cell-white"></div><div class="cell cell-black"><i class="fa-solid fa-chess-queen queen-piece"></i></div><div class="cell cell-white"></div><div class="cell cell-black"></div>
<div class="cell cell-black"></div><div class="cell cell-white"></div><div class="cell cell-black"></div><div class="cell cell-white"><i class="fa-solid fa-chess-queen queen-piece"></i></div>
<div class="cell cell-white"><i class="fa-solid fa-chess-queen queen-piece"></i></div><div class="cell cell-black"></div><div class="cell cell-white"></div><div class="cell cell-black"></div>
<div class="cell cell-black"></div><div class="cell cell-white"></div><div class="cell cell-black"><i class="fa-solid fa-chess-queen queen-piece"></i></div><div class="cell cell-white"></div>
</div></div>
</div>
</div>
<div class="page-number">2</div>
</body>
</html>
