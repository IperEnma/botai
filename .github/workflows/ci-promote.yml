name: CI Promote

on:
  push:
    branches: [main]

concurrency:
  group: ci-promote-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  resolve:
    name: Resolve pending beta
    runs-on: ubuntu-latest
    outputs:
      pending: ${{ steps.beta.outputs.pending }}
      beta_tag: ${{ steps.beta.outputs.beta_tag }}
      beta_sha: ${{ steps.beta.outputs.beta_sha }}
      version: ${{ steps.beta.outputs.version }}
      kind: ${{ steps.beta.outputs.kind }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pending *-beta on main history
        id: beta
        env:
          RELEASE_VERSION_REMOTE: origin
        run: |
          git fetch origin --tags
          eval "$(bash scripts/release-version.sh resolve-pending-beta)"
          echo "pending=${pending:-false}" >> "$GITHUB_OUTPUT"
          if [[ "${pending:-false}" != "true" ]]; then
            echo "No hay *-beta pendiente de promover en main."
            exit 0
          fi
          echo "beta_tag=$beta_tag" >> "$GITHUB_OUTPUT"
          echo "beta_sha=$beta_sha" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "kind=$kind" >> "$GITHUB_OUTPUT"
          echo "Pendiente: $beta_tag @ $beta_sha → final en HEAD ${{ github.sha }}"

  fetch-release-artifact:
    name: Fetch release CI artifact
    needs: [resolve]
    if: needs.resolve.outputs.pending == 'true'
    runs-on: ubuntu-latest
    outputs:
      ci_run_id: ${{ steps.ci-run.outputs.run_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Find successful CI (release) run for beta SHA
        id: ci-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_FILE: ci.yml
        run: |
          RUN_ID=$(bash scripts/ci-find-successful-ci-run.sh "${{ needs.resolve.outputs.beta_sha }}")
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "CI release run: $RUN_ID for ${{ needs.resolve.outputs.beta_sha }}"
      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: botai-build-${{ needs.resolve.outputs.beta_sha }}
          run-id: ${{ steps.ci-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: staging-artifact
      - name: Verify staging artifact
        run: |
          test -f staging-artifact/backend/app.jar
          test -f staging-artifact/vercel-output/config.json
          cat staging-artifact/manifest.json

  promote-prod-artifact:
    name: Promote artifact (prod front)
    needs: [resolve, fetch-release-artifact]
    if: needs.resolve.outputs.pending == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Download staging artifact
        uses: actions/download-artifact@v4
        with:
          name: botai-build-${{ needs.resolve.outputs.beta_sha }}
          run-id: ${{ needs.fetch-release-artifact.outputs.ci_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: staging-artifact
      - name: Build prod artifact (JAR reuse + front prod)
        env:
          ARTIFACT_IN: ${{ github.workspace }}/staging-artifact
          KONECTA_BASE_URL: ${{ vars.PROD_KONECTA_BASE_URL }}
          GOOGLE_CLIENT_ID_WEB: ${{ secrets.PROD_GOOGLE_CLIENT_ID_WEB }}
          PROMOTED_FROM_BETA_SHA: ${{ needs.resolve.outputs.beta_sha }}
          PROMOTED_FROM_BETA_TAG: ${{ needs.resolve.outputs.beta_tag }}
        run: bash scripts/ci-promote-prod-artifacts.sh
      - name: Upload prod deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: botai-build-prod-${{ github.sha }}
          path: dist/botai-build-prod/
          retention-days: 90
          if-no-files-found: error

  promote-gate:
    name: promote
    needs: [resolve, promote-prod-artifact]
    if: always() && needs.resolve.outputs.pending == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Promote gate
        run: |
          if [ "${{ needs.promote-prod-artifact.result }}" != "success" ]; then
            echo "Promote failed"
            exit 1
          fi
          echo "Artifact prod listo para CD (SHA main ${{ github.sha }})"

  final-tag:
    name: Versionado (final)
    needs: [resolve, promote-gate]
    if: >-
      needs.resolve.outputs.pending == 'true' &&
      needs.promote-gate.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create final tag from latest beta
        id: tag
        env:
          RELEASE_VERSION_REMOTE: origin
        run: |
          git fetch origin --tags
          OUT=$(bash scripts/release-version.sh tag-final-from-main --push origin)
          echo "$OUT"
          TAG=$(echo "$OUT" | grep '^tag=' | tail -1 | cut -d= -f2)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  final-tag-visible:
    name: ${{ format('Deploy prod → {0}', needs.final-tag.outputs.tag) }}
    needs: [final-tag]
    if: needs.final-tag.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Tag visible en el grafo y en Annotations
        run: |
          TAG="${{ needs.final-tag.outputs.tag }}"
          echo "::notice title=Deploy production::Tag ${TAG} — Actions → Deploy production → Run workflow"
          {
            echo "## Deploy production"
            echo ""
            echo "# \`${TAG}\`"
            echo ""
            echo "Artifact: \`botai-build-prod-${{ github.sha }}\`"
            echo ""
            echo "**Actions → Deploy production → Run workflow** y pegá ese tag."
          } >> "$GITHUB_STEP_SUMMARY"
