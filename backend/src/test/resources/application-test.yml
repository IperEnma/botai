# ============================================================================
# application-test.yml
# Overrides para los tests de integración del módulo AGENDA.
# Los valores de datasource se sobrescriben dinámicamente en cada test base
# con @DynamicPropertySource a partir del PostgreSQLContainer.
#
# Tablas agenda_* = Hibernate (ddl-auto=update). Flyway: semilla, EXCLUDE, índices/FKs.
# Extensiones V1: AbstractAgendaIntegrationTest + AgendaFlywayConfig (igual que prod).
# ============================================================================

spring:
  task:
    scheduling:
      enabled: false
  # spring.sql.init.mode=never en application.yml; esquema vía Hibernate + Flyway.
  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration/agenda
    table: agenda_flyway_schema_history
    repair-on-migrate: true

  # Desactivamos Spring AI en tests: no necesitamos el modelo Ollama para
  # ejercitar endpoints de AGENDA. Al evitar el autoconfigure, el contexto
  # arranca más rápido y no falla si OLLAMA_BASE_URL no existe.
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAutoConfiguration

  ai:
    model:
      chat: none
      embedding: none

# Bot: valores mínimos para que el contexto del bot cargue sin errores.
bot:
  embedding:
    provider: none
  rag:
    max-chunks: 1
    min-similarity: 0.7
  memory:
    max-history-turns: 1
  session:
    idle-minutes: 45
  buffer:
    debounce-ms: 2500
  guardrails:
    enabled: false
  channels:
    web:
      base-path: /api/v1/webhook

agenda:
  enabled: true
  security:
    enabled: false
  outbox:
    scheduler:
      enabled: false

logging:
  level:
    root: WARN
    com.botai: INFO
    org.flywaydb: INFO
