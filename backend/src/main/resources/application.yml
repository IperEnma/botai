# Lee variables de .env (spring-dotenv). Copia .env.example a .env y configura tus valores.

# -----------------------------------------------------------------------------
# Spring: datos, JPA, SQL init
# -----------------------------------------------------------------------------
spring:
  application:
    name: chatbot-engine

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5444}/${DB_NAME:chatbot}
    username: ${DB_USER:chatbot}
    password: ${DB_PASSWORD:chatbot}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  # ---------------------------------------------------------------------------
  # Spring AI: chat (Ollama) + qué integración de embeddings usa el contenedor
  # ---------------------------------------------------------------------------
  # Embeddings reales: bot.embedding.* (abajo). Si provider=djl → model.embedding=none
  # y NO uses spring.ai.ollama.embedding. Si provider=ollama → model.embedding=ollama
  # y define spring.ai.ollama.embedding.options.model.
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:mixtral}
    model:
      chat: ollama
      embedding: none

# -----------------------------------------------------------------------------
# Bot: motor (orden: IA/RAG → conversación → canales)
# -----------------------------------------------------------------------------
bot:
  # Embeddings (DJL en JVM o Ollama): va junto a spring.ai.model.embedding / ollama arriba.
  embedding:
    provider: djl
    djl:
      model-url: djl://ai.djl.huggingface.pytorch/sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2

  # RAG (pgvector): usa el mismo EmbeddingModel que embedding.provider.
  rag:
    max-chunks: 3
    min-similarity: 0.7

  # Memoria del LLM por sesión (turnos user+assistant de la sesión actual).
  memory:
    max-history-turns: 10

  # Tras N minutos sin mensajes, el siguiente abre sesión nueva (historial IA limpio). 0 = solo reinicio explícito o fin de acción.
  session:
    idle-minutes: 45

  # Espera N ms antes de procesar (agrupa mensajes rápidos).
  buffer:
    debounce-ms: 2500

  # Regex anti–jailbreak / cambio de rol. Desactivar = no bloquear.
  guardrails:
    enabled: true
    # out-of-scope-message: "Solo puedo ayudarte con..."  # opcional; si vacío se usa bot.messages.guardrail-block

  # Textos del bot (BotMessages tiene defaults).
  messages:
    # bad-intent: "No puedo responder a eso. ¿En qué puedo ayudarte con el negocio?"
    # guardrail-block: "Solo puedo ayudarte con temas del negocio. ¿En qué más puedo ayudarte?"
    # no-match: "No tengo una respuesta para eso. Revisa que menú, servicios, horario y conocimiento estén configurados en el panel."
    # tenant-unknown: "No se pudo identificar el negocio. Revisa la configuración del bot."
    # no-rag-info: "No tenemos esa información disponible. ¿En qué más podemos ayudarte?"
    # ai-error: "No pude conectar con el asistente. Verifica que Ollama esté en marcha."
    # ai-hint: "💬 También puedes escribir tu pregunta y te responderé."
    # greeting: "Hola, ¿en qué podemos ayudarte?"   # saludo cuando solo IA (sin menú/FAQ)

  # Features por tenant están en BD (feature_config / bot). Aquí solo canales.
  channels:
    web:
      base-path: /api/v1/webhook
    whatsapp:
      verify-token: ${WHATSAPP_VERIFY_TOKEN:}
      access-token: ${WHATSAPP_ACCESS_TOKEN:}
      phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}

# -----------------------------------------------------------------------------
# HTTP
# -----------------------------------------------------------------------------
server:
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force-request: true
      force-response: true

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  charset:
    console: UTF-8
  level:
    com.botai: DEBUG
    org.hibernate.SQL: WARN

# ============================================================
# [AGENDA] — Configuración del módulo AGENDA (aislada del bot).
# ============================================================
agenda:
  enabled: ${AGENDA_ENABLED:true}
  uploads:
    dir: ${AGENDA_UPLOADS_DIR:uploads}
    base-url: ${AGENDA_UPLOADS_BASE_URL:http://localhost:8080/uploads}
  db:
    table-prefix: agenda_
  search:
    cache-ttl-seconds: 60
    rate-limit:
      requests-per-minute: 60
  booking:
    default-cancellation-hours: 4
  loyalty:
    default-min-attendances: 3
    default-window-days: 30
  notifications:
    scheduled-cron: "0 0 9 * * *"
  payment:
    stub:
      # true: aprueba todo. false: rechaza todo (útil para validar el unhappy path sin cambiar código).
      auto-approve: ${AGENDA_PAYMENT_STUB_AUTO_APPROVE:true}
      # Si > 0, rechaza montos mayores a este valor. 0 = sin límite.
      reject-amount-over: ${AGENDA_PAYMENT_STUB_REJECT_OVER:0}
  idempotency:
    # Limpia claves con más de N horas (tarea programada diaria).
    ttl-hours: 24
  outbox:
    # Delay en ms entre corridas del scheduler de outbox.
    poll-delay-ms: 10000

# -----------------------------------------------------------------------------
# Actuator — métricas y health (solo expone lo mínimo necesario)
# -----------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
