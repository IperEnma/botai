name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop, "release/**", "hotfix/**"]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep
    needs: [gitleaks]
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: |
          semgrep scan --error \
            --config p/java \
            --config p/owasp-top-ten \
            backend/
      - run: |
          semgrep scan --error \
            --config p/dart \
            frontend/lib/

  dependency-check:
    name: OWASP Dependency-Check
    needs: [gitleaks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run OWASP Dependency-Check
        working-directory: backend
        run: >
          mvn -B org.owasp:dependency-check-maven:check
          -DfailBuildOnCVSS=7
          -DsuppressionFiles=dependency-check-suppressions.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: backend/target/dependency-check-report.html
          retention-days: 14

  backend:
    name: Backend tests
    needs: [gitleaks, semgrep, dependency-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: mvn test
        working-directory: backend
        run: mvn test -B

  frontend:
    name: Frontend analyze & test
    needs: [gitleaks, semgrep]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: frontend
      - run: flutter analyze
        working-directory: frontend
      - run: flutter test
        working-directory: frontend

  sonarcloud:
    name: SonarCloud
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Compile backend for Sonar
        working-directory: backend
        run: mvn -B -DskipTests compile test-compile
      - uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  ci:
    name: ci
    needs: [gitleaks, semgrep, dependency-check, backend, frontend, sonarcloud]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All checks passed"
