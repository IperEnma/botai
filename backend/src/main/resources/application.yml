# Lee variables de .env (spring-dotenv). Copia .env.example a .env y configura tus valores.
spring:
  application:
    name: chatbot-engine

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5444}/${DB_NAME:chatbot}
    username: ${DB_USER:chatbot}
    password: ${DB_PASSWORD:chatbot}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  sql:
    init:
      mode: always
  # Spring AI: chat + embeddings. RAG siempre usa búsqueda semántica con el modelo de embeddings.
  # Para un verdadero RAG local: modelo de embeddings local (Hugging Face vía Ollama).
  # Ej: ollama pull nomic-embed-text | ollama pull hf.co/sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3}
      # Embeddings: obligatorio para RAG semántico. Modelo local (Hugging Face GGUF en Ollama).
      embedding:
        options:
          # nomic-embed-text (768 dims); multilingüe: paraphrase-multilingual-MiniLM-L12-v2
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    model:
      chat: ollama
      embedding: ollama

server:
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force-request: true
      force-response: true

# Features (FAQ, AI, Actions) se gestionan por tenant en BD (feature_config / bot).
# Aquí solo config del motor y canales.
bot:
  channels:
    web:
      base-path: /api/v1/webhook
    # WhatsApp Cloud API (Meta). Configurar en .env
    whatsapp:
      verify-token: ${WHATSAPP_VERIFY_TOKEN:}
      access-token: ${WHATSAPP_ACCESS_TOKEN:}
      phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
  # Buffer: espera N ms antes de procesar mensajes (agrupa mensajes rápidos)
  buffer:
    debounce-ms: 2500
  # Memoria: cuántos turnos de conversación recordar (user+assistant)
  memory:
    max-history-turns: 10
  # RAG: siempre activo. Búsqueda por coincidencia semántica (embedding local) + horario + servicios inyectados en cada request.
  rag:
    max-chunks: 5
  # Guardrail: si está activo, se bloquean intentos de jailbreak/cambio de rol por regex. Desactivar = no bloquear.
  guardrails:
    enabled: true
    # out-of-scope-message: "Solo puedo ayudarte con..."  # opcional; si vacío se usa bot.messages.guardrail-block
  # Mensajes del bot (personalizables por entorno). Clase BotMessages tiene valores por defecto.
  messages:
    # bad-intent: "No puedo responder a eso. ¿En qué puedo ayudarte con el negocio?"
    # guardrail-block: "Solo puedo ayudarte con temas del negocio. ¿En qué más puedo ayudarte?"
    # no-match: "No tengo una respuesta para eso. Revisa que menú, servicios, horario y conocimiento estén configurados en el panel."
    # tenant-unknown: "No se pudo identificar el negocio. Revisa la configuración del bot."
    # no-rag-info: "No tenemos esa información disponible. ¿En qué más podemos ayudarte?"
    # ai-error: "No pude conectar con el asistente. Verifica que Ollama esté en marcha."
    # ai-hint: "💬 También puedes escribir tu pregunta y te responderé."
    # greeting: "Hola, ¿en qué podemos ayudarte?"   # saludo cuando solo IA (sin menú/FAQ)

logging:
  level:
    com.botai: DEBUG
    org.hibernate.SQL: WARN
