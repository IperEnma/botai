# Perfil "local": usa usuario postgres (típico en instalación local).
# Ejecutar desde IDE con: -Dspring.profiles.active=local
# No hace falta crear usuario/BD; usa la BD "postgres" por defecto.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      # create-drop: Hibernate crea todas las tablas al arrancar y las elimina al apagar.
      # Cada reinicio parte de cero — útil para probar el flujo de onboarding en limpio.
      ddl-auto: create-drop
  flyway:
    # Deshabilitado porque Hibernate ya gestiona el schema con create-drop.
    # Si lo dejamos activo intentaría crear tablas que Hibernate acaba de crear → conflicto.
    enabled: false
