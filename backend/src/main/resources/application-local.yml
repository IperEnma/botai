# Perfil "local": usa usuario postgres (típico en instalación local).
# Ejecutar desde IDE con: -Dspring.profiles.active=local
# No hace falta crear usuario/BD; usa la BD "postgres" por defecto.
#
# Flujo (primera vez o BD vacía):
#   1. schema.sql — extensiones PG.
#   2. Hibernate (update) — crea/actualiza tablas bot + agenda desde entidades JPA.
#   3. Flyway V1–V3 — semilla, EXCLUDE, idempotencia, índices que JPA no expresa.
# clean-history-before-migrate: solo dev; reejecuta scripts Flyway sin tocar el esquema JPA.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5444/chatbot
    username: chatbot
    password: chatbot
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
  flyway:
    enabled: true
    locations: classpath:db/migration/agenda
    table: agenda_flyway_schema_history
    baseline-on-migrate: true
    baseline-version: 0
    repair-on-migrate: true

agenda:
  flyway:
    clean-history-before-migrate: true
