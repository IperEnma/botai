name: CI test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop, "release/**", "hotfix/**"]

concurrency:
  # Un run a la vez: OWASP comparte caché H2 en ~/.m2; runs paralelos (develop + release) la corrompen.
  group: ci-${{ github.workflow }}
  cancel-in-progress: false

# Modo configuración: GitHub → Settings → Variables → CI_RELAXED=true
# Los jobs fallidos no bloquean el workflow (amarillo). Quitar cuando CI esté estable.

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep
    needs: [gitleaks]
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: |
          semgrep scan --error \
            --config p/java \
            --config p/owasp-top-ten \
            backend/
      # p/dart ya no existe en el registry (404). Secrets + flutter analyze cubren frontend.
      - run: |
          semgrep scan --error \
            --config p/secrets \
            frontend/lib/

  dependency-check:
    name: OWASP
    needs: [gitleaks]
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Cache OWASP NVD database
        id: owasp-nvd-cache
        uses: actions/cache@v4
        with:
          # Maven plugin 12.x guarda odc.mv.db aquí (no en ~/.owasp-nvd-cache).
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-12.2.2-${{ runner.os }}
          restore-keys: |
            owasp-nvd-12.2.2-${{ runner.os }}
            owasp-nvd-${{ runner.os }}-
      - name: Run OWASP Dependency-Check
        working-directory: backend
        run: |
          DATA_DIR="${HOME}/.m2/repository/org/owasp/dependency-check-data"
          mkdir -p "$DATA_DIR"
          OWASP_OPTS=(
            -DfailBuildOnCVSS=7
            -DsuppressionFiles=dependency-check-suppressions.xml
            -DnvdMaxRetryCount=10
            -DdataDirectory="${DATA_DIR}"
          )
          if [ -n "${{ secrets.NVD_API_KEY }}" ]; then
            OWASP_OPTS+=(-DnvdApiKey="${{ secrets.NVD_API_KEY }}")
          fi
          CACHE_HIT="${{ steps.owasp-nvd-cache.outputs.cache-hit }}"
          HAS_NVD=false
          if [ -n "$(find "$DATA_DIR" -name 'odc.mv.db' -print -quit 2>/dev/null)" ]; then
            HAS_NVD=true
          fi
          echo "OWASP cache: cache-hit=${CACHE_HIT} has_odc_mv_db=${HAS_NVD} dir=${DATA_DIR}"
          if [ "$CACHE_HIT" = "true" ] || [ "$HAS_NVD" = "true" ]; then
            echo "NVD en caché — scan sin descarga completa (-DautoUpdate=false)"
            OWASP_OPTS+=(-DautoUpdate=false -DnvdValidForHours=8760)
          else
            echo "NVD cache miss — descarga inicial (~3–5 min con NVD_API_KEY)."
            OWASP_OPTS+=(-DnvdApiDelay=4000 -DnvdValidForHours=168)
          fi
          mvn -B org.owasp:dependency-check-maven:12.2.2:check "${OWASP_OPTS[@]}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: backend/target/dependency-check-report.html
          retention-days: 14

  build-backend:
    name: Backend test + package
    needs: [gitleaks, semgrep, dependency-check]
    if: >-
      always() && !cancelled() &&
      (vars.CI_RELAXED == 'true' ||
       (needs.gitleaks.result == 'success' && needs.semgrep.result == 'success' &&
        needs.dependency-check.result == 'success'))
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      jar_artifact_id: ${{ steps.upload_jar.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: mvn package
        working-directory: backend
        run: mvn -B package
      - name: Locate JAR
        id: jar
        working-directory: backend
        run: |
          JAR="$(ls target/*.jar | grep -v 'original' | head -1)"
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "JAR: $JAR"
      - name: Upload backend JAR
        id: upload_jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/${{ steps.jar.outputs.path }}
          retention-days: 7
          if-no-files-found: error
      - name: Upload Sonar binaries
        id: upload_sonar
        uses: actions/upload-artifact@v4
        with:
          name: backend-sonar-binaries
          path: |
            backend/target/classes
            backend/target/test-classes
          retention-days: 7
          if-no-files-found: error

  sonarcloud:
    name: SonarCloud
    needs: [build-backend]
    if: >-
      always() && !cancelled() && needs.build-backend.result == 'success' &&
      needs.build-backend.outputs.jar_artifact_id != ''
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore classes
        uses: actions/download-artifact@v4
        with:
          name: backend-sonar-binaries
          path: .
      - uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  frontend:
    name: Frontend test
    needs: [gitleaks, semgrep]
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: frontend
      - run: flutter analyze
        working-directory: frontend
      - run: flutter test
        working-directory: frontend

  ci:
    name: ci
    needs: [gitleaks, semgrep, dependency-check, build-backend, sonarcloud, frontend]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      run_staging_pack: ${{ steps.gate.outputs.run_staging_pack }}
      run_beta_tag: ${{ steps.gate.outputs.run_beta_tag }}
    steps:
      - name: CI gate
        id: gate
        env:
          RELAXED: ${{ vars.CI_RELAXED }}
          JAR_ID: ${{ needs.build-backend.outputs.jar_artifact_id }}
          REF_NAME: ${{ github.ref_name }}
          EVENT: ${{ github.event_name }}
        run: |
          run_pack=false
          reasons=()

          if [ "$EVENT" != "push" ]; then
            reasons+=("evento=$EVENT (Staging pack solo en push, no en PR)")
          fi
          if [[ "$REF_NAME" != *".x.x-beta" ]]; then
            reasons+=("rama=$REF_NAME (solo ramas * .x.x-beta, ej. release/1.x.x-beta)")
          fi
          if [ -z "$JAR_ID" ]; then
            reasons+=("sin artifact backend-jar (build-backend falló o no subió JAR)")
          fi

          ok() { case "$1" in success|skipped) return 0 ;; *) return 1 ;; esac; }
          strict_ok=true
          ok "${{ needs.gitleaks.result }}" && ok "${{ needs.semgrep.result }}" && \
          ok "${{ needs.dependency-check.result }}" && ok "${{ needs.build-backend.result }}" && \
          ok "${{ needs.sonarcloud.result }}" && ok "${{ needs.frontend.result }}" || strict_ok=false

          if [ "$EVENT" = "push" ] && [[ "$REF_NAME" == *".x.x-beta" ]] && [ -n "$JAR_ID" ]; then
            if [ "$RELAXED" = "true" ]; then
              run_pack=true
            elif [ "$strict_ok" = true ]; then
              run_pack=true
            else
              reasons+=("CI_RELAXED apagado y hay jobs fallidos")
            fi
          fi

          echo "run_staging_pack=$run_pack" >> "$GITHUB_OUTPUT"
          echo "run_beta_tag=$run_pack" >> "$GITHUB_OUTPUT"

          if [ "$run_pack" = true ]; then
            echo "::notice title=Staging pack::Se ejecutará (CI_RELAXED=${RELAXED:-false})"
          else
            echo "::warning title=Staging pack omitido::${reasons[*]}"
          fi

          if [ "$RELAXED" = "true" ]; then
            echo "::warning::CI_RELAXED=true — check ci no bloquea por fallos en jobs previos."
            exit 0
          fi
          if [ "$strict_ok" = true ]; then
            echo "All checks passed"
            exit 0
          fi
          echo "CI failed — sin tag ni artefactos de release."
          exit 1

  pack-test-deploy-artifacts:
    name: Staging pack
    needs: [ci, build-backend]
    if: >-
      always() && !cancelled() &&
      needs.ci.outputs.run_staging_pack == 'true'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Restore JAR (backend-jar)
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: staging-jar
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Flutter build + pack
        env:
          KONECTA_BASE_URL: ${{ vars.STAGING_KONECTA_BASE_URL }}
          GOOGLE_CLIENT_ID_WEB: ${{ secrets.STAGING_GOOGLE_CLIENT_ID_WEB }}
        run: |
          JAR="$(find staging-jar -name '*.jar' | head -1)"
          test -n "$JAR"
          bash scripts/ci-build-test-artifacts.sh --backend-jar "$JAR"
      - name: Upload botai-build
        uses: actions/upload-artifact@v4
        with:
          name: botai-build-${{ github.sha }}
          path: dist/botai-build/
          retention-days: 90
          if-no-files-found: error

  beta-tag:
    name: Beta tag
    needs: [ci, pack-test-deploy-artifacts]
    if: >-
      always() && !cancelled() &&
      needs.ci.outputs.run_beta_tag == 'true' &&
      needs.pack-test-deploy-artifacts.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT con scope workflow (GITHUB_TOKEN no puede pushear tags si el commit tocó .github/workflows/).
          token: ${{ secrets.RELEASE_VERSION_TOKEN }}
      - name: Create beta tag from branch template
        id: tag
        env:
          RELEASE_VERSION_REMOTE: origin
        run: |
          git fetch origin --tags
          OUT=$(bash scripts/release-version.sh tag-beta-from-branch --push origin)
          echo "$OUT"
          TAG=$(echo "$OUT" | grep '^tag=' | tail -1 | cut -d= -f2)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  beta-tag-visible:
    name: ${{ format('CD test -> {0}', needs.beta-tag.outputs.tag) }}
    needs: [beta-tag]
    if: needs.beta-tag.outputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Tag visible en el grafo y en Annotations
        run: |
          TAG="${{ needs.beta-tag.outputs.tag }}"
          echo "::notice title=CD test::Tag ${TAG} — Actions → CD test → Run workflow"
          {
            echo "## CD test"
            echo ""
            echo "# \`${TAG}\`"
            echo ""
            echo "**Actions → CD test → Run workflow** y pegá ese tag."
          } >> "$GITHUB_STEP_SUMMARY"
