name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop, "release/**", "hotfix/**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # No cancelar en vuelo: OWASP escribe una BD H2 de CVEs; cancelar a medias la corrompe.
  cancel-in-progress: false

# Modo configuración: GitHub → Settings → Variables → CI_RELAXED=true
# Los jobs fallidos no bloquean el workflow (amarillo). Quitar cuando CI esté estable.

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep
    needs: [gitleaks]
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: |
          semgrep scan --error \
            --config p/java \
            --config p/owasp-top-ten \
            backend/
      # p/dart ya no existe en el registry (404). Secrets + flutter analyze cubren frontend.
      - run: |
          semgrep scan --error \
            --config p/secrets \
            frontend/lib/

  dependency-check:
    name: OWASP Dependency-Check
    needs: [gitleaks]
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Cache OWASP NVD database
        id: owasp-nvd-cache
        uses: actions/cache@v4
        with:
          # La BD NVD es global; no atar la key al pom.xml (evita re-descargas).
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-v3
          restore-keys: |
            owasp-nvd-${{ runner.os }}-
      - name: Run OWASP Dependency-Check
        working-directory: backend
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          OWASP_OPTS=(
            -DfailBuildOnCVSS=7
            -DsuppressionFiles=dependency-check-suppressions.xml
            -DnvdMaxRetryCount=10
          )
          if [ "${{ steps.owasp-nvd-cache.outputs.cache-hit }}" = "true" ]; then
            echo "NVD cache hit — sin actualizar la base CVE"
            OWASP_OPTS+=(-DautoUpdate=false)
          else
            echo "NVD cache miss — descarga inicial (lenta; se guardará en cache)"
            OWASP_OPTS+=(-DnvdApiDelay=6000 -DnvdValidForHours=168)
          fi
          mvn -B org.owasp:dependency-check-maven:12.1.0:check "${OWASP_OPTS[@]}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: backend/target/dependency-check-report.html
          retention-days: 14

  backend:
    name: Backend tests
    needs: [gitleaks, semgrep, dependency-check]
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: mvn test
        working-directory: backend
        run: mvn test -B

  frontend:
    name: Frontend analyze & test
    needs: [gitleaks, semgrep]
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
        working-directory: frontend
      - run: flutter analyze
        working-directory: frontend
      - run: flutter test
        working-directory: frontend

  sonarcloud:
    name: SonarCloud
    needs: [backend, frontend]
    continue-on-error: ${{ vars.CI_RELAXED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Compile backend for Sonar
        working-directory: backend
        run: mvn -B -DskipTests compile test-compile
      - uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  ci:
    name: ci
    needs: [gitleaks, semgrep, dependency-check, backend, frontend, sonarcloud]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: CI gate
        run: |
          if [ "${{ vars.CI_RELAXED }}" = "true" ]; then
            echo "::warning::CI_RELAXED=true — pipeline no bloquea por fallos en jobs previos."
            exit 0
          fi
          ok() { case "$1" in success|skipped) return 0 ;; *) return 1 ;; esac; }
          ok "${{ needs.gitleaks.result }}" && ok "${{ needs.semgrep.result }}" && \
          ok "${{ needs.dependency-check.result }}" && ok "${{ needs.backend.result }}" && \
          ok "${{ needs.frontend.result }}" && ok "${{ needs.sonarcloud.result }}" || {
            echo "CI failed — desactivá fallos o arreglá jobs; sin CI_RELAXED no pasa."
            exit 1
          }
          echo "All checks passed"

  beta-tag:
    name: Versionado (beta)
    needs: [ci]
    if: >-
      needs.ci.result == 'success' &&
      github.event_name == 'push' &&
      endsWith(github.ref_name, '.x.x-beta')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create beta tag from branch template
        id: tag
        env:
          RELEASE_VERSION_REMOTE: origin
        run: |
          git fetch origin --tags
          OUT=$(bash scripts/release-version.sh tag-beta-from-branch --push origin)
          echo "$OUT"
          TAG=$(echo "$OUT" | grep '^tag=' | tail -1 | cut -d= -f2)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Deploy test (manual)
        run: |
          echo "::notice title=Tag beta::${{ steps.tag.outputs.tag }} — Actions → Deploy test → Run workflow"
      - name: Summary
        run: |
          {
            echo "## Tag beta"
            echo ""
            echo "**\`${{ steps.tag.outputs.tag }}\`**"
            echo ""
            echo "Desplegar a test: **Actions → Deploy test → Run workflow** con ese tag."
          } >> "$GITHUB_STEP_SUMMARY"

  final-tag:
    name: Versionado (final)
    needs: [ci]
    if: >-
      needs.ci.result == 'success' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create final tag from latest beta
        id: tag
        env:
          RELEASE_VERSION_REMOTE: origin
        run: |
          git fetch origin --tags
          OUT=$(bash scripts/release-version.sh tag-final-from-main --push origin)
          echo "$OUT"
          TAG=$(echo "$OUT" | grep '^tag=' | tail -1 | cut -d= -f2)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Deploy production (manual)
        if: steps.tag.outputs.tag != ''
        run: |
          echo "::notice title=Tag final::${{ steps.tag.outputs.tag }} — Actions → Deploy production → Run workflow"
      - name: Summary
        if: steps.tag.outputs.tag != ''
        run: |
          {
            echo "## Tag final"
            echo ""
            echo "**\`${{ steps.tag.outputs.tag }}\`** (desde la última *-beta en main)"
            echo ""
            echo "Desplegar a prod: **Actions → Deploy production → Run workflow** con ese tag."
          } >> "$GITHUB_STEP_SUMMARY"
