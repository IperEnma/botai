<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="description" content="A new Flutter project.">

  <!-- google-signin-client_id: en runtime main() la inyecta desde GOOGLE_CLIENT_ID_WEB (.env). -->

  <!-- Mata service workers viejos (PWA) ANTES de cargar JS. Incógnito no los tiene; ventana normal sí. -->
  <script>
    (function () {
      var FLAG = 'botai_sw_purge_v1';
      function cleanup() {
        var hadSw = false;
        var chain = Promise.resolve();
        if ('serviceWorker' in navigator) {
          chain = chain.then(function () {
            return navigator.serviceWorker.getRegistrations();
          }).then(function (regs) {
            hadSw = regs.length > 0;
            return Promise.all(regs.map(function (r) { return r.unregister(); }));
          }).then(function () { return hadSw; });
        }
        if ('caches' in window) {
          chain = chain.then(function (prevHadSw) {
            return caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }))
                .then(function () { return prevHadSw; });
            });
          });
        }
        return chain;
      }
      window.__botaiDeployPrep = cleanup().then(function (hadSw) {
        if (hadSw && !sessionStorage.getItem(FLAG)) {
          sessionStorage.setItem(FLAG, '1');
          location.reload();
          return new Promise(function () {});
        }
        sessionStorage.removeItem(FLAG);
      });
    })();
  </script>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="botai_admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>BotAI Admin</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Deploy gate inyectado en Vercel por scripts/inject-web-deploy-gate.py (post flutter build). -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
