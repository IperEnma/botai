# Render Blueprint — backend botai (embeddings API + Neon).
# Dashboard: New → Blueprint → conectar repo, o Web Service manual con rootDir=backend.
#
# Plan free = 512 MB RAM (justo). Si falla por memoria, subir a Starter.

services:
  - type: web
    name: botai-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    envVars:
      - key: JAVA_OPTS
        value: -Xmx384m
      - key: FLYWAY_REPAIR_ON_MIGRATE
        value: false
      - key: BOT_EMBEDDING_PROVIDER
        value: api
      - key: BOT_API_BASE_URL
        value: https://openrouter.ai/api
      - key: BOT_EMBEDDING_API_MODEL
        value: openai/text-embedding-3-small
      - key: BOT_CHAT_API_MODEL
        value: meta-llama/llama-3.3-70b-instruct
      # Neon → tres variables (ver backend/.env.render.example). No uses DATABASE_URL.
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: AGENDA_PUBLIC_BASE_URL
        sync: false
      - key: AGENDA_UPLOADS_BASE_URL
        sync: false
      - key: AGENDA_SECURITY_ENABLED
        value: "true"
