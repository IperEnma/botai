# Lee variables de .env (spring-dotenv). Copia .env.example a .env y configura tus valores.

# -----------------------------------------------------------------------------
# Spring: datos, JPA, SQL init
# -----------------------------------------------------------------------------
spring:
  application:
    name: chatbot-engine

  datasource:
    url: jdbc:postgresql://localhost:5444/chatbot
    username: chatbot
    password: chatbot
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  flyway:
    repair-on-migrate: ${FLYWAY_REPAIR_ON_MIGRATE:true}
    locations: classpath:db/migration/agenda
    table: agenda_flyway_schema_history
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:mixtral}
    model:
      chat: ollama
      embedding: none

# -----------------------------------------------------------------------------
# URLs públicas (backend API + frontend web)
# -----------------------------------------------------------------------------
urls:
  backend: ${PUBLIC_BACKEND_URL:${BOT_PUBLIC_BASE_URL:http://localhost:8080}}
  frontend: ${PUBLIC_FRONTEND_URL:${AGENDA_PUBLIC_BASE_URL:http://localhost:5173}}

# -----------------------------------------------------------------------------
# Seguridad HTTP /api/** (JWT Google)
# -----------------------------------------------------------------------------
security:
  enabled: ${APP_SECURITY_ENABLED:${AGENDA_SECURITY_ENABLED:true}}
  google:
    issuer-uri: ${APP_GOOGLE_ISSUER_URI:${AGENDA_GOOGLE_ISSUER_URI:https://accounts.google.com}}
    audience: ${GOOGLE_CLIENT_ID:${GOOGLE_CLIENT_ID_WEB:}}

# -----------------------------------------------------------------------------
# Archivos subidos (URL pública = urls.backend/uploads)
# -----------------------------------------------------------------------------
uploads:
  dir: ${UPLOADS_DIR:${AGENDA_UPLOADS_DIR:uploads}}

agenda:
  phone:
    # Código de país por defecto (solo dígitos) al normalizar teléfonos locales (099… → 598…).
    default-country-code: ${AGENDA_PHONE_DEFAULT_COUNTRY_CODE:598}
    verification:
      code-length: ${AGENDA_PHONE_VERIFICATION_CODE_LENGTH:6}
      ttl-minutes: ${AGENDA_PHONE_VERIFICATION_TTL_MINUTES:10}
      session-minutes: ${AGENDA_PHONE_VERIFICATION_SESSION_MINUTES:15}
      hash-pepper: ${AGENDA_PHONE_VERIFICATION_HASH_PEPPER:dev-local-pepper-change-me}
      prod-guard-enabled: ${AGENDA_PHONE_VERIFICATION_PROD_GUARD:true}
      audit-retention-days: ${AGENDA_PHONE_VERIFICATION_AUDIT_RETENTION_DAYS:90}
      cleanup-cron: ${AGENDA_PHONE_VERIFICATION_CLEANUP_CRON:0 15 * * * *}
      rate-limit:
        send-per-phone-per-hour: ${AGENDA_PHONE_OTP_SEND_PER_PHONE_HOUR:5}
        send-per-ip-per-minute: ${AGENDA_PHONE_OTP_SEND_PER_IP_MIN:10}
        verify-per-ip-per-minute: ${AGENDA_PHONE_OTP_VERIFY_PER_IP_MIN:20}
        max-failed-attempts: ${AGENDA_PHONE_OTP_MAX_FAILED:5}
        lockout-minutes: ${AGENDA_PHONE_OTP_LOCKOUT_MIN:15}
        http-per-ip-per-minute: ${AGENDA_PHONE_OTP_HTTP_PER_IP_MIN:120}

search:
  cache-ttl-seconds: 60
  rate-limit:
    requests-per-minute: 60

payment:
  stub:
    auto-approve: ${APP_PAYMENT_STUB_AUTO_APPROVE:${AGENDA_PAYMENT_STUB_AUTO_APPROVE:true}}
    reject-amount-over: ${APP_PAYMENT_STUB_REJECT_OVER:${AGENDA_PAYMENT_STUB_REJECT_OVER:0}}

idempotency:
  ttl-hours: 24

notifications:
  scheduled-cron: "0 0 9 * * *"

schedulers:
  enabled: ${APP_SCHEDULERS_ENABLED:true}

# -----------------------------------------------------------------------------
# Bot: chat, RAG, WhatsApp, canales
# -----------------------------------------------------------------------------
bot:
  embedding:
    provider: ${BOT_EMBEDDING_PROVIDER:djl}
    api-dimensions: ${BOT_EMBEDDING_API_DIMENSIONS:384}
    djl:
      model-url: ${BOT_EMBEDDING_DJL_MODEL_URL:djl://ai.djl.huggingface.pytorch/sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}

  chat:
    provider: ${BOT_CHAT_PROVIDER:ollama}

  rag:
    max-chunks: 3
    min-similarity: 0.0
    embed-retry-delay-ms: ${BOT_RAG_EMBED_RETRY_DELAY_MS:600000}
    self-review-enabled: true
    history-turns-for-query: 2
    crag-min-avg-similarity: 0.52
    crag-min-chunk-similarity: 0.40
    retrieval-prefetch-multiplier: 2

  memory:
    max-history-turns: 10

  session:
    idle-minutes: 45

  buffer:
    debounce-ms: 2500

  guardrails:
    enabled: true

  messages: {}

  whatsapp:
    verify-secret: ${BOT_WHATSAPP_VERIFY_SECRET:dev-insecure-change-me}
    encryption-secret: ${BOT_WHATSAPP_ENCRYPTION_SECRET:dev-insecure-change-me}
    verify-token: ${BOT_WHATSAPP_VERIFY_TOKEN:}

  channels:
    web:
      base-path: /api/v1/webhook

# -----------------------------------------------------------------------------
# HTTP
# -----------------------------------------------------------------------------
server:
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force-request: true
      force-response: true

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  charset:
    console: UTF-8
  level:
    com.botai: DEBUG
    org.hibernate.SQL: WARN

# -----------------------------------------------------------------------------
# Actuator
# -----------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# =============================================================================
# Embeddings por API (OpenRouter, OpenAI, Ollama /v1, …)
# =============================================================================
---
spring.config.activate.on-property:
  name: bot.embedding.provider
  having-value: api
spring:
  ai:
    model:
      embedding: openai
      chat: openai
    openai:
      api-key: ${OPENROUTER_API_KEY:${OPENAI_API_KEY:ollama}}
      base-url: ${BOT_API_BASE_URL:${BOT_EMBEDDING_API_BASE_URL:https://openrouter.ai/api}}
      embedding:
        options:
          model: ${BOT_EMBEDDING_API_MODEL:nvidia/llama-nemotron-embed-vl-1b-v2:free}
          dimensions: ${BOT_EMBEDDING_API_DIMENSIONS:384}
      chat:
        options:
          model: ${BOT_CHAT_API_MODEL:openrouter/free}

# =============================================================================
# Chat por API sin Ollama
# =============================================================================
---
spring.config.activate.on-property:
  name: bot.chat.provider
  having-value: api
spring:
  ai:
    model:
      chat: openai
    openai:
      api-key: ${OPENROUTER_API_KEY:${OPENAI_API_KEY:ollama}}
      base-url: ${BOT_API_BASE_URL:${BOT_EMBEDDING_API_BASE_URL:https://openrouter.ai/api}}
      chat:
        options:
          model: ${BOT_CHAT_API_MODEL:openrouter/free}
