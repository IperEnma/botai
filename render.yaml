# Render Blueprint — backend botai (Neon).
# Plan free = 512 MB RAM. Config por defecto sin cargos OpenRouter (chat free + embeddings DJL en JVM).
# Si el servicio muere por memoria al cargar DJL, subir a Starter o usar BOT_EMBEDDING_PROVIDER=api (embeddings de pago).

services:
  - type: web
    name: botai-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    envVars:
      - key: JAVA_OPTS
        value: -Xmx384m
      - key: FLYWAY_REPAIR_ON_MIGRATE
        value: false
      # $0 OpenRouter: chat free; vectores RAG en JVM (384 dims → embedding_384)
      - key: BOT_EMBEDDING_PROVIDER
        value: djl
      - key: BOT_CHAT_PROVIDER
        value: api
      - key: BOT_API_BASE_URL
        value: https://openrouter.ai/api
      - key: BOT_CHAT_API_MODEL
        value: openrouter/free
      # Neon → tres variables (ver backend/.env.render.example). No uses DATABASE_URL.
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: AGENDA_PUBLIC_BASE_URL
        sync: false
      - key: AGENDA_UPLOADS_BASE_URL
        sync: false
      - key: AGENDA_SECURITY_ENABLED
        value: "true"
